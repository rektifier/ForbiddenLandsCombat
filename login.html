<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Forbidden Lands Fighting Pit">
    <meta name="author" content="Mikael Ribeiro">
    <title>Forbidden Lands Fighting Pit - Login</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css"
        integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">


    <script src="https://www.gstatic.com/firebasejs/5.8.2/firebase.js"></script>
    <script src="scripts/config.js"></script>
    <script src="scripts/common.js"></script>


</head>

<body>

    <div class="container">

        <div class="row">
            <div class="col" style="height:100px"></div>
        </div>

        <div class="row" id="login">

            <div class="col"></div>
            <div class="col-6">
                <div class="card">
                    <div class="card-body">
                        <form>
                            <div class="form-group">
                                <label for="login-username-input">Join a fight!</label>
                                <input type="text" class="form-control" id="login-username-input"
                                    aria-describedby="nameHelp" placeholder="Vem är det som ska slåss?"><button
                                    id="logout-button" type="button" class="btn btn-primary">Logga ut</button>
                            </div>
                            <div class="form-group">
                                <input type="text" class="form-control" id="room-input" aria-describedby="nameHelp"
                                    placeholder="Vilket rum?">
                            </div>
                            <div class="form-group">
                                <button id="login-button" type="button" class="btn btn-primary">Ta mig till
                                    fighten!</button>
                            </div>


                        </form>
                    </div>
                </div>
            </div>
            <div class="col"></div>
        </div>



    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"
        integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>

    <script type="text/javascript">

        $(document).ready(function () {


            $("#logout-button").hide();

            $("#logout-button").click(function (e) {
                firebase.auth().signOut();
            });


            $("#login-button").click(function (e) {

                e.preventDefault();
                e.stopPropagation();

                var username = $("#login-username-input").val();
                var roomname = $("#room-input").val();

                if (username !== null && roomname !== null) {

                    firebase.auth().signInAnonymously().then(() => {

                        var currentUser = firebase.auth().currentUser;

                        if (currentUser) {
                            currentUser.updateProfile({
                                displayName: username
                            });

                            //check if room exists
                            //
                            database.ref('rooms/' + roomname).once("value").then(function (snapshot) {

                                if (snapshot.exists()) {

                                    //room exists

                                    //add user to room
                                    database.ref('rooms/' + roomname + '/users/' + username).set({ "name": username, "messages": {}, "sortOrder": 99 }).then(() => {
                                        window.location.href = "room.html?room=" + roomname;
                                    });


                                } else {

                                    //create room with nice template
                                    //
                                    // set current user as owner
                                    //
                                    database.ref('rooms/' + roomname).set({ "owner": username }).then(() => {

                                        database.ref('rooms/' + roomname + '/users/' + username).set({ "name": username, "messages": {}, "sortOrder": 99 }).then(() => {

                                            window.location.href = "room.html?room=" + roomname;
                                        });
                                    });
                                }



                            });
                        }

                    }).catch(function (error) {
                        // Handle Errors here.
                        var errorCode = error.code;
                        var errorMessage = error.message;

                        console.log(errorCode);
                        console.log(errorMessage);

                        return;
                    });




                }
            });

            firebase.auth().onAuthStateChanged(function (user) {

                if (user) {

                    window.user = user;
                    $("#logout-button").show();

                    $("#login-username-input").val(user.displayName);
                    $("#login-username-input").prop('disabled', true);

                } else {

                    $("#logout-button").hide();
                    $("#login-username-input").val('');
                    $("#login-username-input").prop('disabled', false);

                }
            });


        });
    </script>


</body>

</html>
